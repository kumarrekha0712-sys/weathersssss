
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🌦 Weather Dashboard</h1>

  <div class="search-box">
    <input type="text" id="cityInput" placeholder="Search city...">
    <button id="searchBtn">Search</button>
  </div>

  <div class="popular">
    <button class="city-btn">Hyderabad</button>
    <button class="city-btn">Delhi</button>
    <button class="city-btn">London</button>
    <button class="city-btn">Tokyo</button>
  </div>

  <div id="loading" class="hidden">Loading...</div>

  <div id="weatherCard" class="weather-card hidden">
    <h2 id="cityName"></h2>
    <p id="temperature"></p>
    <p id="wind"></p>
    <p id="humidity"></p>
    <p id="condition"></p>
  </div>

  <div id="error" class="error hidden"></div>
</div>

<script src="script.js"></script>
</body>
</html>
